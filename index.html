<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나의 할 일</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <header class="app-header">
            <h1>📋 나의 할 일</h1>
        </header>

        <section class="progress-section" aria-label="진행률">
            <div
                class="progress-bar"
                id="progress-bar"
                role="progressbar"
                aria-label="할 일 진행률"
                aria-valuemin="0"
                aria-valuemax="100"
                aria-valuenow="0"
            >
                <div class="progress-bar-fill" id="progress-bar-fill"></div>
            </div>
            <p class="progress-text" id="progress-text">0 / 0 완료 (0%)</p>
        </section>

        <section class="input-section">
            <label for="todo-input" class="visually-hidden">할 일 내용</label>
            <input
                type="text"
                id="todo-input"
                placeholder="할 일을 입력하세요"
                maxlength="200"
                autocomplete="off"
            >
            <label for="category-select" class="visually-hidden">카테고리 선택</label>
            <select id="category-select">
                <option value="auto">자동</option>
                <option value="work">업무</option>
                <option value="personal">개인</option>
                <option value="study">공부</option>
            </select>
            <button type="button" id="add-button">추가</button>
            <p class="input-counter" id="input-counter" aria-live="off">0 / 200</p>
            <p class="auto-hint" id="auto-hint" aria-live="polite" hidden></p>
        </section>

        <section class="filter-section" role="tablist" aria-label="카테고리 필터">
            <button type="button" class="filter-button" role="tab" aria-selected="true" data-filter="all">전체</button>
            <button type="button" class="filter-button" role="tab" aria-selected="false" data-filter="work">업무</button>
            <button type="button" class="filter-button" role="tab" aria-selected="false" data-filter="personal">개인</button>
            <button type="button" class="filter-button" role="tab" aria-selected="false" data-filter="study">공부</button>
        </section>

        <section class="list-section">
            <ul id="todo-list" aria-label="할 일 목록"></ul>
            <p class="empty-state" id="empty-state" hidden></p>
        </section>
    </div>

    <div class="toast-container" id="toast-container" aria-live="polite" aria-atomic="false"></div>

    <script src="app.js"></script>
</body>
</html>
